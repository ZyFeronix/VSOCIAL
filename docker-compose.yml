version: '3.8'

services:
  vsocial:
    build: .
    container_name: vsocial_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/database.sqlite
      - JWT_SECRET=${JWT_SECRET}
      - UPLOAD_DIR=/data/uploads
    volumes:
      - vsocial_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  vsocial_data:
