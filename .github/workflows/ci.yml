# VSocial — Continuous Integration
#
# Runs the same gates the Husky pre-commit hook enforces locally
# (prettier --check + eslint + production build) on every push and pull request,
# so a broken change can't reach main unnoticed.
#
# Tests are intentionally omitted for now: `npm run test` (vitest) is currently
# broken in this repo — vitest fails to create the Vite server and better-sqlite3
# (the DB driver the test assumes) isn't installed. Once the test environment is
# fixed, re-enable the `test` job below.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — saves CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (prettier --check + eslint)
        run: npm run lint

      - name: Build (Vite production build + SvelteKit adapter-node)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsocial-build
          path: frontend/build
          if-no-files-found: error
          retention-days: 7

  # --- Tests (disabled until the test environment is fixed) -----------------
  # Uncomment once `npm run test` passes locally. The blocker today:
  #   1. vitest fails at Vite-server creation (vite-plugin-svelte hot-update).
  #   2. tests/auth.test.js uses better-sqlite3 sync API but only @libsql/client
  #      is installed (async). Either install better-sqlite3 as a devDep or
  #      migrate the test to `await db.prepare(...).get()`.
