<!doctype html>
<html lang="es" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f172a" />
		<meta
			name="description"
			content="VSocial — La red social premium para creadores virtuales. VTubers, streamers, artistas y sus comunidades."
		/>
		<meta
			name="keywords"
			content="red social, creadores virtuales, VTubers, streamers, arte digital, comunidad"
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="VSocial" />
		<meta property="og:image" content="/og-image.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Noto+Color+Emoji&display=swap"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Noto+Color+Emoji&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media = 'all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Noto+Color+Emoji&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		<link
			href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media = 'all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		<link
			rel="icon"
			type="image/svg+xml"
			href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2300e5ff'/%3E%3Cpath d='M25,30 L50,80 L75,30 L60,30 L50,55 L40,30 Z' fill='%230D0821'/%3E%3C/svg%3E"
		/>
		<script>
			// Override de Accesibilidad: Forzar animaciones de Svelte ignorando el SO
			const originalMatchMedia = window.matchMedia;
			window.matchMedia = function (query) {
				if (query && query.includes('prefers-reduced-motion')) {
					return {
						matches: false,
						media: query,
						onchange: null,
						addListener: function () {},
						removeListener: function () {},
						addEventListener: function () {},
						removeEventListener: function () {},
						dispatchEvent: function () {
							return false;
						}
					};
				}
				return originalMatchMedia.apply(window, arguments);
			};
		</script>
		<!-- BLOCKING: apply theme before first paint to prevent flash -->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('vsocial_theme');
					var theme =
						stored === 'dark' || stored === 'light' || stored === 'midnight'
							? stored
							: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					document.documentElement.setAttribute('data-theme', theme);

					// SSR Flash Fix: Add is-reels class synchronously for F5 reloads
					if (window.location.pathname.startsWith('/reels')) {
						document.body.classList.add('is-reels');
						document.documentElement.classList.add('is-reels');
					}
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-mesh">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
