**VSocial** es una red social completa construida con SvelteKit 5, SQLite/libSQL,
WebSockets en tiempo real y un sistema de diseño Glassmorphism 2.0 propio.

**Estado:** Alpha v0.0.2 — Funcional completo, 16 módulos, 35 tablas, 24 API endpoints.
En desarrollo activo.

> 📖 **Documentación completa:** **DOCS** — arquitectura, schema, rutas,
> componentes, API, configuración, operaciones y roadmap.

---

## Módulos

| Módulo | Descripción |
|--------|-------------|
| **Social Core** | Posts, comentarios anidados, reacciones, hashtags, check-ins geolocalizados |
| **Reels** | Videos cortos con likes, comentarios y métricas |
| **Stories** | Historias efímeras (24h) + highlights permanentes |
| **Mensajería** | Chat DM + grupos con media, voz, replies, reacciones, typing indicators |
| **Notificaciones** | SSE en tiempo real, pestañas inteligentes, optimistic UI |
| **Marketplace** | Categorías, listings con precio/condición/ubicación, detección de fraude |
| **Freelance Gigs** | Tablón de encargos y postulaciones |
| **Grupos & Páginas** | Comunidades públicas/privadas, posts grupales, eventos con RSVP |
| **Wallet** | Monedero virtual con balance y transacciones |
| **Gamificación** | XP, niveles, check-ins diarios, rachas, títulos, leaderboard |
| **Admin Panel** | Dashboard, gestión de usuarios, reportes, moderación de contenido, settings |
| **Push Notifications** | Web Push (VAPID), suscripciones por usuario |
| **Seguridad** | JWT (httpOnly cookies), rate limiting, CSRF, Helmet, HSTS, bloqueos, snooze |
| **PWA** | Service worker cache-first, install prompt, manifest.json |
| **Diseño** | Glassmorphism 2.0 + Neo-Aero tokenizado, perfiles customizables |

```bash
# 1. Dependencias
cd frontend && npm install && cd ..

# 2. Configuración
cp .env.example .env    # editar .env → mínimo: JWT_SECRET

# 3. Base de datos (opcional)

# 4. Arrancar

Primera visita → wizard de instalación en `/install` → crea tablas y admin → ready.

# VSocial — Documentación Completa de Proyecto (Alpha v0.0.2)

> Documento técnico maestro. Arquitectura, stack, módulos, API, base de datos, configuración,
> operaciones y guía de desarrollo. Todo en un solo archivo.

---

## 1. Visión General

**VSocial** es una red social full-stack construida con SvelteKit 5, SQLite/LibSQL,
WebSockets y diseño Glassmorphism 2.0 propio. Cubre el espectro completo de una plataforma
social moderna: feed, posts, reels, stories, marketplace, mensajería en tiempo real,
grupos, notificaciones push, gamificación y panel administrativo.

- **Versión:** Alpha v0.0.2
- **Licencia:** GPLv3
- **Estado:** Funcional completo — 16+ módulos implementados

### Novedades Recientes
- **Físicas de Arrastre:** El creador de posts (`/posts/create`) ahora usa el mismo motor de físicas inerciales (drag-to-scroll) de la Landing Page para la selección de moods.
- **Reproductor Multimedia Glassmorphism:** Se reemplazó el reproductor de video nativo en `/stories/create` y `/reels/create` por el componente `MediaPlayer` propio de la plataforma.
- **Historias de Solo Texto:** El backend ahora soporta la creación y visualización de historias sin media, puramente basadas en color de fondo y texto.

### Características Principales:
- **Sistema de Feeds Transparentes (Anti-Caja Negra):** El usuario tiene control total sobre su contenido mediante tres algoritmos sin opacidad:
  - **Radar en Vivo (Línea de Tiempo):** 100% cronológico estricto y global, sin filtros ocultos. Muestra absolutamente todo lo que se publica en la plataforma en tiempo real, segmentado únicamente por tu idioma principal (para evitar ruido irrelevante).
  - **Feed Inteligente (Personalizado):** Ordenamiento lógico basado explícitamente en los hashtags, categorías y creadores con los que más interactúas, sin ocultar contenido deliberadamente.
  - **Descubrimiento (Para Ti):** Muestra contenido en tendencia y de nuevos creadores basado en la relevancia global y frescura, dando oportunidades equitativas de visibilidad sin usar ML tóxico de retención.

---

## 2. Tech Stack

### 2.1 Frontend

| Capa | Tecnología |
|------|-----------|
| Framework | SvelteKit 5 (SSR + CSR híbrido) |
| Reactividad | Runes de Svelte 5 (`$state`, `$derived`, `$props`) |
| Estilos | Tailwind CSS + DaisyUI base + CSS puro para Glassmorphism |
| Iconografía | Material Icons Round (Google Fonts) |
| Emojis | Noto Color Emoji (Nativo). *Nota: Componentes internos conservan prefijo "Twemoji" por legado.* |
| Empaquetado | Vite 8 |
| Adapter | `@sveltejs/adapter-node` (servidor Node.js standalone) |
| PWA | Service worker cache-first, manifest.json |

### 2.2 Backend

| Capa | Tecnología |
|------|-----------|
| API | Rutas SvelteKit `+server.js` (mismo proceso Node.js) |
| Auth | JWT (`jsonwebtoken`) en cookies `httpOnly` |
| Sesiones | Tabla `user_sessions` con token hash + IP + user-agent |
| OAuth | Google, Apple (estructura lista, implementación parcial) |
| Hashing | bcryptjs |
| Validación | `validator` + módulo `security.js` propio |
| Rate Limiting | In-memory (150 req/min por IP) en `hooks.server.js` |
| Email | Nodemailer (verificación, reset password) |
| Logging | Pino + pino-pretty (structured JSON logs) |
| Seguridad HTTP | Helmet + headers manuales (HSTS, X-Frame-Options, etc.) |
| CSRF | Validación de Origin/Referer en `hooks.server.js` |

### 2.3 Base de Datos

| Capa | Tecnología |
|------|-----------|
| Motor primario | `@libsql/client` v0.17+ (soporta local WAL + remoto Turso) |
| Fallback | `better-sqlite3` (nativo, síncrono envuelto en async) |
| API unificada | Adaptador universal en `db.js` — misma interfaz para ambos |
| Esquema | 783 líneas SQL idempotente (`schema_sqlite.sql`) |
| Migraciones | Carpeta `migrations/` + scripts `migrate-up.js` / `migrate-down.js` |
| ORM | No se usa. Raw SQL con prepared statements |

### 2.4 Tiempo Real

| Capa | Tecnología |
|------|-----------|
| WebSockets | `socket.io` (servidor + cliente) |
| Chat | Mensajería DM + grupos con media, voz, reacciones, replies |
| WebRTC | Señalización para llamadas via `rtc_signals` |
| SSE | Stream de notificaciones via `/api/notifications` |

### 2.5 Infraestructura / DevOps

| Capa | Tecnología |
|------|-----------|
| Contenedores | Docker + docker-compose (single service + healthcheck) |
| Proxy reverso | nginx.conf (WebSocket-ready, buffering off) |
| Redis | No usado (arquitectura in-memory local) |
| Tests | Vitest (`tests/auth.test.js`) |
| Linting | ESLint 9 + Prettier 3 + plugin Svelte |
| Git hooks | Husky (`.husky/`) |
| CI/CD | Pre-commit linting + build verification |

## 4. Arquitectura de Datos

### 4.1 Principios

- **Idempotente**: `schema_sqlite.sql` se ejecuta en cada arranque con `CREATE TABLE IF NOT EXISTS`.
  Es seguro correrlo contra una DB existente.
- **Single Source of Truth**: El archivo `schema_sqlite.sql` es la fuente canónica. Las migraciones
  en `migrations/` son solo registro histórico.
- **Raw SQL**: Sin ORM. Todas las queries son SQL puro con prepared statements.
- **Transacciones ACID**: WAL mode, foreign keys ON, busy_timeout 5000ms.
- ** Índices estratégicos**: Cada tabla tiene índices para los patrones de consulta más frecuentes.


### 4.3 Persistence Architecture & Concurrency
- **SQLite Unique Index**: We heavily rely on SQLite's constraints to prevent race conditions. For example, `unique_activity_idx` ensures that activity logs (views, likes) are not duplicated even under high concurrency.
- **Svelte Runes**: The UI aggressively uses `$state` and `$derived` to reflect the database state immediately, utilizing an Optimistic UI pattern backed by reliable SQLite backend sync.
- **WAL Mode**: Essential for scaling. Allows concurrent reads while writes are occurring, effectively handling viral traffic patterns.

cd frontend

#### Opción B: Docker

```bash
# configurar .env con JWT_SECRET y demás variables de producción
docker-compose up --build -d
```

El contenedor expone puerto `3000`, monta un volumen `vsocial_data` en `/data` (DB + uploads),
y tiene healthcheck cada 30s contra `/api/health`.

#### Opción C: Nginx + Node.js

```bash
# 1. Arrancar Node.js en puerto 3000
cd frontend && npm start &

# 2. Nginx como proxy reverso
nginx -c /path/to/nginx.conf
```

Nginx maneja WebSocket upgrades, establece headers de IP real, y deshabilita buffering.

## 13. Seguridad

| Capa | Implementación |
|------|---------------|
| **Rate Limiting** | In-memory Map en `hooks.server.js`: 150 req/min por IP para `/api/`. Staff exento. GC cada 2 min. |
| **CSRF** | Validación de headers `Origin`/`Referer` contra host en POST/PUT/DELETE. 403 si no coinciden. |
| **Headers HTTP** | `X-Content-Type-Options: nosniff`, `X-Frame-Options: DENY`, `Strict-Transport-Security` (max-age=63072000 + includeSubDomains + preload), `Referrer-Policy: strict-origin-when-cross-origin`, `Permissions-Policy` (cámara off, mic/geolocalización self) |
| **Auth** | JWT en cookie `httpOnly` + Secure + SameSite=Lax. Tokens hasheados en `user_sessions`. |
| **Passwords** | bcryptjs con salt automático |
| **Input** | Validación con `validator` (email, username, password strength). Sanitización HTML con `dompurify`. |
| **Helmet** | Middleware de seguridad HTTP (activado en producción) |
| **Bloqueos** | Tabla `blocked_users` (bloqueo bidireccional). Tabla `snoozed_users` (silencio temporal). |
| **Reportes** | Sistema de reportes con estados (pending, reviewed, resolved, dismissed). |

## 14. Workers Cron (en `hooks.server.js`)

Ejecutados en el mismo proceso Node.js, disparados en el primer request:

| Worker | Intervalo | Función |
|--------|-----------|---------|
| **Scheduled Post Publisher** | 60s | Publica posts con `scheduled_at &lt;= now`, envía notificaciones a seguidores |
| **Daily Memories** | 00:01 cada día | Busca posts "en este día" de años anteriores, envía notificación de recuerdo |
| **Expired Stories Cleanup** | 5 min | Elimina stories con `expires_at &lt; now` |
| **Expired Snooze Cleanup** | 1 hora | Limpia snoozes expirados |
| **Rate Limiter GC** | 2 min | Elimina entradas expiradas del Map de rate limiting |

## Filosofía del Proyecto (Leer antes de programar)

VSocial tiene fuertes convicciones arquitectónicas documentadas en:
- **ARCHITECTURE** — decisiones de diseño e ideología
- **DOCS** — referencia técnica completa
- **Personality & SOUL** — estándares de ingeniería

Principios clave que debes respetar:

| Principio | Qué significa |
|-----------|---------------|
| **Solo SQL Puro** | Sin ORMs. Cada consulta es SQL preparado en `+server.js` o `$lib/server/`. |
| **Runes de Svelte 5** | `$state`, `$derived`, `$props` para reactividad. Stores tradicionales solo para estado global complejo. |
| **libSQL primero** | El adaptador de DB en `db.js` prefiere `@libsql/client`. `better-sqlite3` es solo respaldo. |
| **Glassmorphism 2.0** | Usa el sistema de diseño tokenizado. Sin colores arbitrarios, sin valores hex puros. |
| **Listo para Producción siempre** | Sin `// TODO`, sin stubs, sin funciones a medias. Un PR es código de producción. |
| **Seguridad por defecto** | Toda entrada se valida. Todo endpoint tiene rate-limit o auth. Consultas preparadas siempre. |

## Estrategia de Ramas

- `main` — código listo para producción. Protegida.
- Ramas de características: `feature/<nombre>` o `fix/<nombre>`.
- Sin commits directos a `main`. Siempre vía PR.

---

## Convención de Commits

```
<type>(<scope>): <subject>

[optional body]
```

Tipos: `feat`, `fix`, `refactor`, `style`, `docs`, `test`, `chore`, `perf`

Alcances: `auth`, `feed`, `posts`, `reels`, `stories`, `marketplace`, `messages`,
`notifications`, `wallet`, `gigs`, `admin`, `groups`, `pages`, `db`, `ui`, 
`security`, `api`, `gamification`, `docs`, `deps`

Ejemplos:
```
feat(feed): agregar ranking inteligente con paginación basada en cursor
fix(notifications): prevenir error por enlace de actor indefinido
docs(docs): agregar sección de referencia de endpoints API
perf(db): agregar índice compuesto en posts(user_id, created_at)
```

---

## Convenciones de Código

### Rutas SvelteKit

- Páginas: `src/routes/<ruta>/+page.svelte`
- API: `src/routes/api/<ruta>/+server.js`
- APIs comodín (catch-all) usan el patrón `[...path]/+server.js`.
- Exportar funciones nombradas (`GET`, `POST`, `PUT`, `DELETE`, `PATCH`).

### Base de Datos

- Cambios de esquema van en `schema_sqlite.sql` (idempotente, `CREATE TABLE IF NOT EXISTS`).
- Migraciones no destructivas van en `migrations/<NNN>_<descripcion>.sql`.
- Scripts de reversión (rollback) van en `migrations/<NNN>_<descripcion>.down.sql`.
- Nunca concatenar cadenas en SQL. Siempre usar sentencias preparadas:
  ```js
  db.prepare('SELECT * FROM users WHERE id = ?').get(userId);
  ```


- File: `src/lib/components/&lt;Name&gt;.svelte`
- Use runes for internal state.
- Accept `$props()` for public API.
- Use `class:` directive for conditional Tailwind classes.
- Dynamic class names must be in Tailwind safelist OR use inline styles.

### Stores

- File: `src/lib/stores/&lt;name&gt;.svelte.js`
- Export reactive state with runes.
- Export action functions that mutate state AND call API.

### Server Modules

- File: `src/lib/server/&lt;name&gt;.js`
- Functions are async (compatible with libSQL wrapper).
- Import `getDb()` from `$lib/server/db.js`.
- Never call `initDb()` directly — it's handled by `hooks.server.js`.

## Testing

```bash
cd frontend
npm run test        # ejecutar todas las pruebas
npm run test:watch  # modo observador (watch)
```

- Pruebas unitarias para módulos de servidor y utilidades.
- Pruebas de integración para endpoints de la API.
- Archivo de pruebas actual: `tests/auth.test.js` (validadores de seguridad + conectividad DB).
- Agregar pruebas en `tests/` con la extensión `.test.js`.

---

## Linting y Formateo

Antes de enviar un PR:

```bash
cd frontend
npm run format   # prettier --write + eslint --fix
npm run lint     # verificar que todo pase
```

Los hooks de pre-commit de Husky también ejecutarán revisiones de lint automáticamente.

---

## Lista de Verificación para Pull Request

- [ ] El código sigue las convenciones del proyecto (Runes, SQL Puro, Tokens de Glassmorphism).
- [ ] Sin `// TODO`, sin código comentado, sin logs de depuración.
- [ ] Seguridad revisada: entradas validadas, SQL parametrizado, autenticación verificada.
- [ ] Rendimiento considerado: consultas a BD indexadas, paginación basada en cursor.
- [ ] `npm run lint` pasa limpiamente.
- [ ] `npm run test` pasa limpiamente.
- [ ] Cambios de esquema están en `schema_sqlite.sql` (idempotentes).
- [ ] Nuevas migraciones tienen su correspondiente `.down.sql` para reversión.
- [ ] La descripción del PR explica QUÉ, POR QUÉ y CÓMO probar.

---

## Por Dónde Empezar

Buenas contribuciones para iniciar:

1. **Agregar pruebas** — la cobertura es mínima. Agrega pruebas de Vitest para endpoints API y consultas BD.
2. **Mejorar manejo de errores** — muchos endpoints tienen try/catch básicos. Agregar respuestas de error estructuradas.
3. **Documentar API** — agregar anotaciones OpenAPI/Swagger o una referencia de API dedicada.
4. **Pruebas (E2E)** – `tests/auth.test.js` existe. Se necesitan más pruebas unitarias de Vitest y E2E de Playwright para flujos críticos (mensajería, reels).
5. **Plantillas de Email** — mejorar el HTML de los emails de verificación y restablecimiento de contraseña.

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            marked.setOptions({
                highlight: function(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                langPrefix: 'hljs language-',
                gfm: true,
                breaks: true
            });

            // Decode HTML entities from template
            function decodeHtml(html) {
                var txt = document.createElement("textarea");
                txt.innerHTML = html;
                return txt.value;
            }

            const renderMd = (id) => {
                const raw = document.getElementById(`md-${id}`).innerHTML;
                const decoded = decodeHtml(raw);
                const html = DOMPurify.sanitize(marked.parse(decoded));
                document.getElementById(id).innerHTML = html;
            };

            renderMd('readme');
            renderMd('docs');
            renderMd('contributing');

            const tabBtns = document.querySelectorAll('.tab-btn');
            const panels = document.querySelectorAll('.content-panel');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.getAttribute('data-target');
                    
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    panels.forEach(p => {
                        p.classList.remove('active');
                        if(p.id === target) {
                            p.style.animation = 'none';
                            p.offsetHeight;
                            p.style.animation = null;
                            p.classList.add('active');
                        }
                    });
                });
            });
        });
    </script>
